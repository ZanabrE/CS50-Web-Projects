{% extends "network/layout.html" %}

{% block body %}

    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h2 class="text-center font-weight-bold mb-4">Login</h2>

                    {% if message %}
                        <div class="alert alert-danger py-2 text-center" role="alert">
                            {{ message }}
                        </div>
                    {% endif %}

                    <form action="{% url 'login' %}" method="post">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <input autofocus class="form-control bg-light border-0" type="text" name="username" placeholder="Username">
                        </div>
                        <div class="form-group mb-3">
                            <input class="form-control bg-light border-0" type="password" name="password" placeholder="Password">
                        </div>
                        <button class="btn btn-primary btn-block shadow-sm py-2 font-weight-bold" type="submit">
                            Log In
                        </button>
                    </form>

                    <hr class="my-4">

                    <div claSS="text-center">
                        <P class="text-muted small mb-0">Don't have an account?</P> 
                        <a href="{% url 'register' %}">Register here.</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
