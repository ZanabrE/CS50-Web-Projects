{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Meal Planner{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Simple responsive grid layout styles -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="{% static 'planner/css/style.css' %}">
</head>
<body>
    <!-- Setup standard global CSRF security tokane for JavaScript Fetch access -->
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}">

    <!-- Navigation bar -->
    <nav class="container-fluid">
        <ul>
            <li><strong>&#x1F34F; Wasteless Planner</strong></li>
        </ul>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#" id="run-optimizer-btn" class="contrast">Run Optimizer</a></li>
        </ul>
    </nav>

    <main class="container-fluid">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Core interactive client script -->
    <script src="{% static 'planner/js/calendar.js' %}"></script>
</body>
</html>
