{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Meal Planner{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Simple responsive grid layout styles -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="{% static 'planner/css/styles.css' %}">
</head>
<body>
    <!-- Setup standard global CSRF security tokane for JavaScript Fetch access -->
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}">

    <!-- Navigation Bar Wrapper -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard' %}">&#x1F34F; Wasteless Planner</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    <a class="nav-link btn btn-success text-white px-3 mx-2" href="#" id="run-optimizer-btn">Run Optimizer</a>
                    <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                    <a class="nav-link" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block body %}
        {% endblock %}
    </main>

    <!-- Bootstrap 5 Bundle with Popper JS -->
    <script src="https://jsdelivr.net" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
    <!-- Core interactive client script -->
    <script src="{% static 'planner/js/calendar.js' %}"></script>
</body>
</html>
