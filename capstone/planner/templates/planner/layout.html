{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Meal Planner{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'planner/css/styles.css' %}">
</head>
<body>
    <!-- Setup standard global CSRF security tokane for JavaScript Fetch access -->
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}">

    <!-- Navigation Bar Wrapper -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard' %}">&#x1F34F; Wasteless Planner</a>

            <!-- Hamburger icon appears natively on small viewports -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mealPlannerNavbar" aria-controls="mealPlannerNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Dropdown wrapper collapses navigation link stacks cleanly on mobile -->
            <div class="collapse navbar-collapse" id="mealPlannerNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'dashboard' %}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-success btn-sm text-white px-3 my-2 my-lg-0 mx-lg-2" href="#" id="run-optimizer-btn">Run Optimizer</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block body %}
        {% endblock %}
    </main>

    <!-- Loads Bootstrap safely offline from computer -->
    <script src="{% static 'planner/js/bootstrap.local.js' %}"></script>
    
    <!-- Core interactive client script -->
    <script src="{% static 'planner/js/calendar.js' %}"></script>
</body>
</html>
