<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <script>
            let count = 0;

            function myFunction() {
                count++;
                alert("Count: " + count);
            }
        </script>
    </head> 
    <body>
        <h1>Hello World</h1>
        <p>This is my first JavaScript code.</p>
        <button onclick="myFunction()">Click me</button>
    </body>
</html>
