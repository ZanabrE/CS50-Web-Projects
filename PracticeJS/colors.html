<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <script>
            // Adding an event listener to the form to handle the submit event and change the background color of the page to the entered color
            document.addEventListener("DOMContentLoaded", function() {
                
                document.querySelector("form").onsubmit = function() {
                    const color = document.querySelector('#color').value;
                    document.body.style.backgroundColor = color; // Change the background color of the page to the entered color
                };
            });

            
        </script>
    </head> 
    <body>
        <h1>Change the background color of the page</h1>
        
        <form>
            <input autofocus type="text" id="color" placeholder="Enter a color">
            <input type="submit" value="Submit">
        </form>
        
    </body>
</html>
