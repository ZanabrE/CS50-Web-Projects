<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <script>
            function myFunction() {
                // Toggle the content of the <h1> element between "Hello World!" and "Good Bye!"
                // Using an improvement of the if statement to check the current content of the <h1> element and change it accordingly
                let heading = document.querySelector("h1"); // Get the current content of the <h1> element
                if (heading.innerHTML === "Hello World!") {
                    heading.innerHTML = "Good Bye!"; // Change the content of the <h1> element
                } else {
                    heading.innerHTML = "Hello World!"; // Change the content of the <h1> element
                }
            }
        </script>
    </head> 
    <body>
        <h1>Hello World!</h1>
        <p>This is my first JavaScript code.</p>
        <button onclick="myFunction()">Click me</button>
        
    </body>
</html>
