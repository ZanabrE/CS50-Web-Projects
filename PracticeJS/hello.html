            //Adding an event listener to the form to handle the submit event and display an alert with the entered name
            document.addEventListener("DOMContentLoaded", function() {
                
                document.querySelector("form").onsubmit = function() {
                    const name = document.querySelector('#name').value;
                    alert(`Hello, ${name}!`);
                };
            });

            
        </script>

    <body>
        <h1>Hello World!</h1>
        
        <form>
            <input autofocus type="text" id="name" placeholder="Enter your name">
            <input type="submit" value="Submit">
        </form>
